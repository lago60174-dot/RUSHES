<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0A0A0B"/>
    </linearGradient>
    <linearGradient id="gv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect width="512" height="512" rx="108" fill="none" stroke="url(#gv)" stroke-width="2" opacity="0.3"/>
  <!-- Film strip left -->
  <rect x="36" y="56" width="32" height="44" rx="7" fill="#22C55E" opacity="0.25"/>
  <rect x="36" y="112" width="32" height="44" rx="7" fill="#22C55E" opacity="0.2"/>
  <rect x="36" y="168" width="32" height="44" rx="7" fill="#22C55E" opacity="0.15"/>
  <rect x="36" y="224" width="32" height="44" rx="7" fill="#22C55E" opacity="0.1"/>
  <!-- Film strip right -->
  <rect x="444" y="56" width="32" height="44" rx="7" fill="#F97316" opacity="0.25"/>
  <rect x="444" y="112" width="32" height="44" rx="7" fill="#F97316" opacity="0.2"/>
  <rect x="444" y="168" width="32" height="44" rx="7" fill="#F97316" opacity="0.15"/>
  <rect x="444" y="224" width="32" height="44" rx="7" fill="#F97316" opacity="0.1"/>
  <!-- R letter -->
  <text x="258" y="348"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="310"
    font-weight="900"
    fill="url(#gv)"
    opacity="0.95">R</text>
  <!-- Accent dots -->
  <circle cx="186" cy="440" r="10" fill="#22C55E" opacity="0.7"/>
  <circle cx="214" cy="440" r="7" fill="#4ADE80" opacity="0.5"/>
  <circle cx="256" cy="440" r="14" fill="url(#gv)" opacity="0.8"/>
  <circle cx="298" cy="440" r="7" fill="#F97316" opacity="0.5"/>
  <circle cx="326" cy="440" r="10" fill="#F97316" opacity="0.7"/>
</svg>
